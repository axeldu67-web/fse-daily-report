<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Subscribe — FSE Daily Report</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Outfit',-apple-system,sans-serif;background:#0a0f1e;color:#fff;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px 16px}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(99,140,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(99,140,255,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.card{width:100%;max-width:420px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:clamp(28px,4vw,40px);position:relative;z-index:1;text-align:center}
.back{display:inline-flex;align-items:center;gap:6px;color:rgba(255,255,255,.4);font-size:13px;text-decoration:none;margin-bottom:20px;position:relative;z-index:1}
h1{font-size:24px;font-weight:800;margin-bottom:8px}
.for{font-size:14px;color:rgba(255,255,255,.4);margin-bottom:8px}
.price{font-size:48px;font-weight:800;margin:20px 0 8px;background:linear-gradient(90deg,#638cff,#00e5a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.perks{list-style:none;text-align:left;margin:20px 0 28px;display:flex;flex-direction:column;gap:10px}
.perks li{display:flex;align-items:center;gap:10px;font-size:14px;color:rgba(255,255,255,.75)}
.perks li::before{content:"✓";color:#00e5a0;font-weight:700}
.methods{display:flex;gap:10px;margin-bottom:20px;justify-content:center}
.method{flex:1;padding:12px 8px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center}
.btn{width:100%;padding:17px;border-radius:14px;border:none;background:linear-gradient(135deg,#3a5bd9,#4a6cf7);color:#fff;font-family:inherit;font-size:17px;font-weight:800;cursor:pointer;box-shadow:0 8px 32px rgba(74,108,247,.4)}
.note{font-size:11px;color:rgba(255,255,255,.25);margin-top:12px}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div style="width:100%;max-width:420px;position:relative;z-index:1">
  <a href="/" class="back">← Back</a>
  <div class="card">
    <div style="font-size:32px;margin-bottom:12px">⚙️</div>
    <h1 id="payTitle">Unlock Full Access</h1>
    <div class="for" id="payFor"></div>
    <div class="price">3,99€<span style="font-size:18px;color:rgba(255,255,255,.4)">/mo</span></div>
    <ul class="perks" id="perks">
      <li>Unlimited daily reports</li>
      <li>EN & FR generation</li>
      <li>Perfect professional format</li>
      <li>Cancel anytime</li>
    </ul>
    <div class="methods">
      <div class="method">
        <svg height="20" viewBox="0 0 165 105" xmlns="http://www.w3.org/2000/svg"><path d="M57.5 35.5c1.9-2.3 3.2-5.4 2.8-8.5-2.7.1-6 1.8-7.9 4.1-1.7 2-3.2 5.2-2.8 8.2 3 .3 6-1.5 7.9-3.8zm2.7 4.3c-4.4-.3-8.1 2.5-10.2 2.5-2.1 0-5.3-2.4-8.8-2.3-4.5.1-8.7 2.6-11 6.7-4.7 8.1-1.2 20.1 3.3 26.7 2.2 3.3 4.9 6.8 8.4 6.7 3.3-.1 4.6-2.1 8.6-2.1 4 0 5.1 2.1 8.6 2 3.6-.1 5.9-3.3 8.1-6.6 2.5-3.7 3.5-7.4 3.6-7.5-.1-.1-6.9-2.7-7-10.7-.1-6.7 5.5-9.9 5.7-10.1-3.1-4.6-8-5.1-9.3-5.3zM89.4 31h-9.1v47.6h4.9V62.3h6.5c5.9 0 10.1-4 10.1-10.5 0-6.4-4.1-10.8-10.4-10.8zm1.1 16.6h-5.3V35.6h5.3c4 0 6.3 2.1 6.3 6 0 3.8-2.3 6-6.3 6z" fill="#fff"/></svg>
        <span style="font-size:12px;font-weight:700;margin-left:4px">Pay</span>
      </div>
      <div class="method">
        <svg height="20" viewBox="0 0 80 30" xmlns="http://www.w3.org/2000/svg"><text y="22" font-size="18" font-family="Arial" font-weight="bold"><tspan fill="#4285F4">G</tspan><tspan fill="#EA4335">o</tspan><tspan fill="#FBBC05">o</tspan><tspan fill="#4285F4">g</tspan><tspan fill="#34A853">l</tspan><tspan fill="#EA4335">e</tspan></text><text x="52" y="22" font-size="14" font-family="Arial" font-weight="500" fill="white">Pay</text></svg>
      </div>
      <div class="method">
        <svg height="20" viewBox="0 0 80 30" xmlns="http://www.w3.org/2000/svg"><text y="22" font-size="14" font-family="Arial" font-weight="bold"><tspan fill="#003087">Pay</tspan><tspan fill="#009cde">Pal</tspan></text></svg>
      </div>
    </div>
    <button class="btn" id="payBtn" onclick="pay()">Subscribe — 3,99€/month</button>
    <div class="note">Secure payment by Stripe</div>
  </div>
</div>
<script>
var u = JSON.parse(localStorage.getItem("fse_user")||"{}");
var lang = localStorage.getItem("fse_lang")||"en";
document.getElementById("payFor").textContent = (u.name||"") + (u.email?" · "+u.email:"");
if(lang==="fr"){
  document.getElementById("payTitle").textContent="Accès complet";
  document.getElementById("perks").innerHTML="<li>Rapports illimités</li><li>Génération EN & FR</li><li>Format professionnel parfait</li><li>Résiliation à tout moment</li>";
  document.getElementById("payBtn").textContent="S'abonner — 3,99€/mois";
}
function pay(){
  window.location.href="https://buy.stripe.com/3cI28qdxl5Ep2aO0oN8Ra00";
}
</script>
</body>
</html>
